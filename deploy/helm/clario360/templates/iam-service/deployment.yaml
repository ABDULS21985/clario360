{{- if .Values.iamService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "iam-service") }}
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "iam-service") | nindent 4 }}
spec:
  {{- if not ((.Values.iamService).autoscaling).enabled }}
  replicas: {{ .Values.iamService.replicaCount | default 2 }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.iamService.revisionHistoryLimit | default 5 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-services.yaml") . | sha256sum }}
        {{- include "clario360.prometheusAnnotations" (dict "metricsPort" "9081") | nindent 8 }}
        {{- with .Values.iamService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 8 }}
        {{- with .Values.iamService.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clario360.serviceAccountName" (dict "root" . "component" "iam-service" "svcConfig" .Values.iamService) }}
      securityContext:
        {{- include "clario360.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.iamService.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: iam-service
          image: {{ include "clario360.image" (dict "imageConfig" .Values.iamService.image "root" . "defaultRepo" "clario360/iam-service") }}
          imagePullPolicy: {{ .Values.iamService.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- include "clario360.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 9081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-shared-config
            - configMapRef:
                name: {{ include "clario360.componentName" (dict "root" . "component" "iam-service") }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: IAM_DB_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-redis-credentials
                  key: REDIS_PASSWORD
            - name: AUTH_RSA_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-jwt-keys
                  key: AUTH_RSA_PRIVATE_KEY_PEM
            - name: AUTH_RSA_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-jwt-keys
                  key: AUTH_RSA_PUBLIC_KEY_PEM
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clario360.fullname" . }}-shared-config
                  key: KAFKA_BROKERS
            - name: KAFKA_GROUP_ID
              value: "iam-service"
            - name: OTEL_SERVICE_NAME
              value: "iam-service"
            {{- with .Values.iamService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "clario360.healthProbes" (dict "portName" "http" "healthPath" "/healthz" "readyPath" "/readyz") | nindent 10 }}
          resources:
            {{- toYaml .Values.iamService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (default "dev" .Values.global.environment) "production" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 14 }}
      {{- with .Values.iamService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.iamService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.iamService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
