{{- if .Values.iamService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clario360.fullname" . }}-iam-service
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "iam-service") | nindent 4 }}
spec:
  replicas: {{ .Values.iamService.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/iam-service/configmap.yaml") . | sha256sum }}
        {{- include "clario360.prometheusAnnotations" (dict "metricsPort" "9091") | nindent 8 }}
      labels:
        {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clario360.serviceAccountName" (dict "root" . "component" "iam-service" "svcConfig" .Values.iamService) }}
      securityContext:
        {{- include "clario360.podSecurityContext" . | nindent 8 }}
      containers:
        - name: iam-service
          securityContext:
            {{- include "clario360.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.iamService.image.repository }}:{{ .Values.iamService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.iamService.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-shared-config
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-iam-service-config
            - secretRef:
                name: {{ include "clario360.fullname" . }}-redis-secret
            - secretRef:
                name: {{ include "clario360.fullname" . }}-jwt-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-secret
                  key: IAM_DB_URL
            - name: KAFKA_GROUP_ID
              value: "iam-service"
            - name: OTEL_SERVICE_NAME
              value: "iam-service"
          {{- include "clario360.healthProbes" (dict "portName" "http" "healthPath" "/healthz" "readyPath" "/readyz") | nindent 10 }}
          resources:
            {{- toYaml .Values.iamService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (default "dev" .Values.global.environment) "production" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "iam-service") | nindent 14 }}
      {{- with .Values.iamService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.iamService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.iamService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
