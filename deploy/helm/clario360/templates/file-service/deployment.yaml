{{- if .Values.fileService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clario360.fullname" . }}-file-service
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "file-service") | nindent 4 }}
spec:
  replicas: {{ .Values.fileService.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "file-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/file-service/configmap.yaml") . | sha256sum }}
        {{- include "clario360.prometheusAnnotations" (dict "metricsPort" "9091") | nindent 8 }}
      labels:
        {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "file-service") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clario360.serviceAccountName" (dict "root" . "component" "file-service" "svcConfig" .Values.fileService) }}
      securityContext:
        {{- include "clario360.podSecurityContext" . | nindent 8 }}
      containers:
        - name: file-service
          securityContext:
            {{- include "clario360.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.fileService.image.repository }}:{{ .Values.fileService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.fileService.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8091
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-shared-config
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-file-service-config
            - secretRef:
                name: {{ include "clario360.fullname" . }}-redis-secret
          env:
            - name: FILE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-secret
                  key: PLATFORM_DB_URL
            - name: FILE_REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: FILE_KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clario360.fullname" . }}-shared-config
                  key: KAFKA_BROKERS
            - name: FILE_KAFKA_GROUP_ID
              value: "file-service"
            - name: FILE_JWT_PUBLIC_KEY_PATH
              value: "/etc/secrets/jwt-public-key.pem"
            - name: FILE_MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clario360.fullname" . }}-shared-config
                  key: MINIO_ENDPOINT
            - name: FILE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-minio-secret
                  key: FILE_MINIO_ACCESS_KEY
            - name: FILE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-minio-secret
                  key: FILE_MINIO_SECRET_KEY
            - name: FILE_ENCRYPTION_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-encryption-secret
                  key: FILE_ENCRYPTION_MASTER_KEY
            - name: OTEL_SERVICE_NAME
              value: "file-service"
          {{- include "clario360.healthProbes" (dict "portName" "http" "healthPath" "/healthz" "readyPath" "/readyz") | nindent 10 }}
          resources:
            {{- toYaml .Values.fileService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: jwt-public-key
              mountPath: /etc/secrets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: jwt-public-key
          secret:
            secretName: {{ include "clario360.fullname" . }}-jwt-secret
            items:
              - key: AUTH_RSA_PUBLIC_KEY_PEM
                path: jwt-public-key.pem
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (default "dev" .Values.global.environment) "production" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "file-service") | nindent 14 }}
      {{- with .Values.fileService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fileService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fileService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
