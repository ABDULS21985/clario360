{{- if .Values.lexService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "lex-service") }}
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "lex-service") | nindent 4 }}
  {{- with ((.Values.lexService).service).annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ dig "service" "type" "ClusterIP" .Values.lexService }}
  ports:
    - name: http
      port: 8087
      targetPort: http
      protocol: TCP
    - name: admin
      port: 9087
      targetPort: admin
      protocol: TCP
  selector:
    {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "lex-service") | nindent 4 }}
{{- end }}
