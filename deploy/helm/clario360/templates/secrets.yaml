type: Opaque
data:
  MINIO_ACCESS_KEY: {{ required "secrets.minio.accessKey is required when secrets.minio.existingSecret is not set" .Values.secrets.minio.accessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ required "secrets.minio.secretKey is required when secrets.minio.existingSecret is not set" .Values.secrets.minio.secretKey | b64enc | quote }}
{{- end }}
