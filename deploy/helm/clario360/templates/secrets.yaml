---
{{/* ================================================================
     Notification Secrets
     ================================================================ */}}
{{- if not .Values.secrets.notification.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-notification-secrets
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification
type: Opaque
data:
  NOTIF_WEBHOOK_HMAC_SECRET: {{ required "secrets.notification.webhookHmacSecret is required when secrets.notification.existingSecret is not set" .Values.secrets.notification.webhookHmacSecret | b64enc | quote }}
  NOTIF_SENDGRID_API_KEY: {{ .Values.secrets.notification.sendgridApiKey | default "" | b64enc | quote }}
{{- end }}
