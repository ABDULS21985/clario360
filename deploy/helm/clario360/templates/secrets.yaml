type: Opaque
data:
  SMTP_USERNAME: {{ required "secrets.smtp.username is required when secrets.smtp.existingSecret is not set" .Values.secrets.smtp.username | b64enc | quote }}
  SMTP_PASSWORD: {{ required "secrets.smtp.password is required when secrets.smtp.existingSecret is not set" .Values.secrets.smtp.password | b64enc | quote }}
