{{/*
Secrets — uses the existingSecret pattern.
If the operator provides an existingSecret name the chart will NOT create the
Secret resource; instead Deployments must reference that pre-existing Secret.
When no existingSecret is set the chart creates the Secret with base64
placeholder values that MUST be overridden at install time via --set or a
sealed-secrets / external-secrets workflow.
*/}}

{{/* ================================================================
     Database Credentials
     ================================================================ */}}
{{- if not .Values.secrets.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-database-credentials
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    helm.sh/hook-weight: "-10"
type: Opaque
data:
  DATABASE_USER: {{ .Values.secrets.database.user | default "clario360" | b64enc | quote }}
  DATABASE_PASSWORD: {{ required "secrets.database.password is required when secrets.database.existingSecret is not set" .Values.secrets.database.password | b64enc | quote }}
  # Per-service database URLs (built at install time)
  IAM_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "iam" .Values.secrets.database.iamDb)) | b64enc | quote }}
  PLATFORM_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "platform" .Values.secrets.database.platformDb)) | b64enc | quote }}
  CYBER_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "cyber" .Values.secrets.database.cyberDb)) | b64enc | quote }}
  DATA_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "dataservice" .Values.secrets.database.dataDb)) | b64enc | quote }}
  ACTA_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "acta" .Values.secrets.database.actaDb)) | b64enc | quote }}
  LEX_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "lex" .Values.secrets.database.lexDb)) | b64enc | quote }}
  VISUS_DB_URL: {{ include "clario360.databaseUrl" (dict "root" . "dbName" (default "visus" .Values.secrets.database.visusDb)) | b64enc | quote }}
{{- end }}
---
{{/* ================================================================
     Redis Credentials
     ================================================================ */}}
{{- if not .Values.secrets.redis.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-redis-credentials
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  REDIS_PASSWORD: {{ required "secrets.redis.password is required when secrets.redis.existingSecret is not set" .Values.secrets.redis.password | b64enc | quote }}
  REDIS_URL: {{ include "clario360.redisUrl" . | b64enc | quote }}
{{- end }}
---
{{/* ================================================================
     Kafka Credentials
     ================================================================ */}}
{{- if not .Values.secrets.kafka.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-kafka-credentials
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
type: Opaque
data:
  KAFKA_SASL_USERNAME: {{ required "secrets.kafka.saslUsername is required when secrets.kafka.existingSecret is not set" .Values.secrets.kafka.saslUsername | b64enc | quote }}
  KAFKA_SASL_PASSWORD: {{ required "secrets.kafka.saslPassword is required when secrets.kafka.existingSecret is not set" .Values.secrets.kafka.saslPassword | b64enc | quote }}
{{- end }}
---
{{/* ================================================================
     JWT Signing Keys
     ================================================================ */}}
{{- if not .Values.secrets.jwt.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-jwt-keys
