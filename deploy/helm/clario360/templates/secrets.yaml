  AUTH_RSA_PUBLIC_KEY_PEM: {{ required "secrets.jwt.rsaPublicKeyPem is required when secrets.jwt.existingSecret is not set" .Values.secrets.jwt.rsaPublicKeyPem | b64enc | quote }}
{{- end }}
---
{{/* ================================================================
     Encryption Key (AES-256)
     ================================================================ */}}
{{- if not .Values.secrets.encryption.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clario360.fullname" . }}-encryption-key
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: encryption
type: Opaque
data:
  ENCRYPTION_KEY: {{ required "secrets.encryption.key is required when secrets.encryption.existingSecret is not set" .Values.secrets.encryption.key | b64enc | quote }}
{{- end }}
