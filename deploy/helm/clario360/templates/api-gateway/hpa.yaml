{{- if and .Values.apiGateway.enabled ((.Values.apiGateway).autoscaling).enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "api-gateway") }}
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "api-gateway") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "clario360.componentName" (dict "root" . "component" "api-gateway") }}
  minReplicas: {{ ((.Values.apiGateway).autoscaling).minReplicas | default 2 }}
  maxReplicas: {{ ((.Values.apiGateway).autoscaling).maxReplicas | default 10 }}
  metrics:
    {{- if ((.Values.apiGateway).autoscaling).targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ ((.Values.apiGateway).autoscaling).targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if ((.Values.apiGateway).autoscaling).targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ ((.Values.apiGateway).autoscaling).targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
