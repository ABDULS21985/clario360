{{- if .Values.notificationService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clario360.fullname" . }}-notification-service
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "notification-service") | nindent 4 }}
spec:
  replicas: {{ .Values.notificationService.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "notification-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/notification-service/configmap.yaml") . | sha256sum }}
        {{- include "clario360.prometheusAnnotations" (dict "metricsPort" "9090") | nindent 8 }}
      labels:
        {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "notification-service") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clario360.serviceAccountName" (dict "root" . "component" "notification-service" "svcConfig" .Values.notificationService) }}
      securityContext:
        {{- include "clario360.podSecurityContext" . | nindent 8 }}
      containers:
        - name: notification-service
          securityContext:
            {{- include "clario360.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.notificationService.image.repository }}:{{ .Values.notificationService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.notificationService.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8089
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-shared-config
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-notification-service-config
            - secretRef:
                name: {{ include "clario360.fullname" . }}-redis-secret
            - secretRef:
                name: {{ include "clario360.fullname" . }}-jwt-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-secret
                  key: PLATFORM_DB_URL
            {{- if .Values.notificationService.smtp.enabled }}
            - name: NOTIF_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-smtp-secret
                  key: NOTIF_SMTP_PASSWORD
            {{- end }}
            - name: NOTIF_WEBHOOK_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-notification-secret
                  key: NOTIF_WEBHOOK_HMAC_SECRET
            - name: NOTIF_IAM_SERVICE_URL
              value: "http://{{ include "clario360.fullname" . }}-iam-service:8081"
            - name: OTEL_SERVICE_NAME
              value: "notification-service"
          {{- include "clario360.healthProbes" (dict "portName" "http" "healthPath" "/healthz" "readyPath" "/readyz") | nindent 10 }}
          resources:
            {{- toYaml .Values.notificationService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (default "dev" .Values.global.environment) "production" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "notification-service") | nindent 14 }}
      {{- with .Values.notificationService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.notificationService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.notificationService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
