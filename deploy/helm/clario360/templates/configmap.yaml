apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.fullname" . }}-config
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
data:
  SERVER_HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DATABASE_SSL_MODE: "require"
  DATABASE_MAX_OPEN_CONNS: "25"
  DATABASE_MAX_IDLE_CONNS: "10"
  REDIS_DB: "0"
  KAFKA_GROUP_ID: "clario360"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  METRICS_ENABLED: "true"
  {{- if .Values.observability.tracing.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.tracing.otlpEndpoint | quote }}
  {{- end }}
