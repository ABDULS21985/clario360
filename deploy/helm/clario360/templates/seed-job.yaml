{{- if .Values.seedData.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "clario360.fullname" . }}-seed
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: {{ .Values.seedData.activeDeadlineSeconds | default 600 }}
  backoffLimit: {{ .Values.seedData.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        {{- include "clario360.labels" . | nindent 8 }}
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "clario360.fullname" . }}-seed
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.database.host }} {{ .Values.database.port }}; do echo "Waiting for database..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: seeder
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.seedData.image.repository }}:{{ .Values.seedData.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.seedData.image.pullPolicy | default "IfNotPresent" }}
          command: ["/seeder"]
          args:
            - "--iam-db-url=$(IAM_DB_URL)"
            - "--platform-db-url=$(PLATFORM_DB_URL)"
            - "--cyber-db-url=$(CYBER_DB_URL)"
            - "--data-db-url=$(DATA_DB_URL)"
            - "--acta-db-url=$(ACTA_DB_URL)"
            - "--lex-db-url=$(LEX_DB_URL)"
            - "--visus-db-url=$(VISUS_DB_URL)"
          env:
            - name: IAM_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: IAM_DB_URL
            - name: PLATFORM_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: PLATFORM_DB_URL
            - name: CYBER_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: CYBER_DB_URL
            - name: DATA_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: DATA_DB_URL
            - name: ACTA_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: ACTA_DB_URL
            - name: LEX_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: LEX_DB_URL
            - name: VISUS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: VISUS_DB_URL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clario360.fullname" . }}-shared
                  key: ENVIRONMENT
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
