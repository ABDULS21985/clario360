{{- if .Values.cronjobs.auditPartitionMaintenance.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "clario360.fullname" . }}-audit-partition-maintenance
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: cronjob-audit-partition-maintenance
spec:
  schedule: {{ .Values.cronjobs.auditPartitionMaintenance.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronjobs.auditPartitionMaintenance.activeDeadlineSeconds | default 600 }}
      backoffLimit: {{ .Values.cronjobs.auditPartitionMaintenance.backoffLimit | default 2 }}
      template:
        metadata:
          labels:
            app.kubernetes.io/component: cronjob-audit-partition-maintenance
            app.kubernetes.io/part-of: clario360
        spec:
          restartPolicy: OnFailure
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: audit-partition-maintenance
              {{- if .Values.cronjobs.auditPartitionMaintenance.image }}
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.cronjobs.auditPartitionMaintenance.image.repository }}:{{ .Values.cronjobs.auditPartitionMaintenance.image.tag | default .Chart.AppVersion }}"
              {{- else }}
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.auditService.image.repository }}:{{ .Values.auditService.image.tag | default .Chart.AppVersion }}"
              {{- end }}
              imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
              command: ["/app"]
              args: ["--job=audit-partition-maintenance"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "clario360.fullname" . }}-database-credentials
                      key: PLATFORM_DB_URL
                - name: OTEL_SERVICE_NAME
                  value: "audit-partition-maintenance"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                {{- toYaml .Values.cronjobs.auditPartitionMaintenance.resources | nindent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
