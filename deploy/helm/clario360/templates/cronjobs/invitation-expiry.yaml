{{- if .Values.cronjobs.invitationExpiry.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "clario360.fullname" . }}-invitation-expiry
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.labels" . | nindent 4 }}
    app.kubernetes.io/component: cronjob-invitation-expiry
spec:
  schedule: {{ .Values.cronjobs.invitationExpiry.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronjobs.invitationExpiry.activeDeadlineSeconds | default 600 }}
      backoffLimit: {{ .Values.cronjobs.invitationExpiry.backoffLimit | default 2 }}
      template:
        metadata:
          labels:
            app.kubernetes.io/component: cronjob-invitation-expiry
            app.kubernetes.io/part-of: clario360
        spec:
          restartPolicy: OnFailure
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: invitation-expiry
              {{- if .Values.cronjobs.invitationExpiry.image }}
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.cronjobs.invitationExpiry.image.repository }}:{{ .Values.cronjobs.invitationExpiry.image.tag | default .Chart.AppVersion }}"
              {{- else }}
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.onboardingService.image.repository }}:{{ .Values.onboardingService.image.tag | default .Chart.AppVersion }}"
              {{- end }}
              imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
              command: ["/app"]
              args: ["--job=invitation-expiry"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "clario360.fullname" . }}-database-credentials
                      key: PLATFORM_DB_URL
                - name: OTEL_SERVICE_NAME
                  value: "invitation-expiry"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                {{- toYaml .Values.cronjobs.invitationExpiry.resources | nindent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
