{{/* ================================================================
     Notification Service
     ================================================================ */}}
{{- if .Values.services.notificationService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "notification-service") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "notification-service") | nindent 4 }}
data:
  NOTIF_HTTP_PORT: "8089"
  NOTIF_ADMIN_PORT: "9089"
  NOTIF_WS_MAX_CONNECTIONS_PER_USER: {{ .Values.services.notificationService.wsMaxConnectionsPerUser | default "5" | quote }}
  NOTIF_WS_PING_INTERVAL_SEC: {{ .Values.services.notificationService.wsPingIntervalSec | default "30" | quote }}
  NOTIF_DIGEST_ENABLED: {{ .Values.services.notificationService.digestEnabled | default "true" | quote }}
  NOTIF_DIGEST_DAILY_UTC_HOUR: {{ .Values.services.notificationService.digestDailyUtcHour | default "8" | quote }}
  NOTIF_RATE_LIMIT_PER_MINUTE: {{ .Values.services.notificationService.rateLimitPerMinute | default "120" | quote }}
  NOTIF_ENVIRONMENT: {{ .Values.global.environment | quote }}
