  ACTA_DASHBOARD_CACHE_TTL: {{ .Values.services.actaService.dashboardCacheTtl | default "60s" | quote }}
  ACTA_OVERDUE_CHECK_INTERVAL: {{ .Values.services.actaService.overdueCheckInterval | default "5m" | quote }}
  ACTA_COMPLIANCE_CHECK_INTERVAL: {{ .Values.services.actaService.complianceCheckInterval | default "1h" | quote }}
