{{/*
Per-service ConfigMaps — non-sensitive, service-specific configuration.
Each service gets its own ConfigMap, created only when the service is enabled.
*/}}

{{/* ================================================================
     API Gateway
     ================================================================ */}}
{{- if .Values.services.apiGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "api-gateway") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "api-gateway") | nindent 4 }}
data:
  GW_HTTP_PORT: "8080"
  GW_ADMIN_PORT: "9090"
  GW_CORS_ALLOWED_ORIGINS: {{ .Values.services.apiGateway.corsAllowedOrigins | default "*" | quote }}
  GW_MAX_REQUEST_BODY_MB: {{ .Values.services.apiGateway.maxRequestBodyMb | default "10" | quote }}
  GW_PROXY_TIMEOUT_SEC: {{ .Values.services.apiGateway.proxyTimeoutSec | default "30" | quote }}
  GW_READ_TIMEOUT_SEC: {{ .Values.services.apiGateway.readTimeoutSec | default "15" | quote }}
  GW_WRITE_TIMEOUT_SEC: {{ .Values.services.apiGateway.writeTimeoutSec | default "15" | quote }}
  # Rate limiting
  GW_RATELIMIT_ENABLED: {{ .Values.services.apiGateway.rateLimit.enabled | default "true" | quote }}
  GW_RATELIMIT_DEFAULT_RPM: {{ .Values.services.apiGateway.rateLimit.defaultRpm | default "600" | quote }}
  GW_RATELIMIT_BURST_SIZE: {{ .Values.services.apiGateway.rateLimit.burstSize | default "50" | quote }}
  # Circuit breaker
  GW_CB_MAX_REQUESTS: {{ .Values.services.apiGateway.circuitBreaker.maxRequests | default "5" | quote }}
  GW_CB_INTERVAL_SEC: {{ .Values.services.apiGateway.circuitBreaker.intervalSec | default "60" | quote }}
  GW_CB_TIMEOUT_SEC: {{ .Values.services.apiGateway.circuitBreaker.timeoutSec | default "30" | quote }}
  GW_CB_FAILURE_RATIO: {{ .Values.services.apiGateway.circuitBreaker.failureRatio | default "0.6" | quote }}
  # Upstream service URLs (K8s internal DNS)
  GW_SVC_URL_IAM: "http://{{ include "clario360.componentName" (dict "root" . "component" "iam-service") }}:8081"
  GW_SVC_URL_AUDIT: "http://{{ include "clario360.componentName" (dict "root" . "component" "audit-service") }}:8084"
  GW_SVC_URL_WORKFLOW: "http://{{ include "clario360.componentName" (dict "root" . "component" "workflow-engine") }}:8085"
  GW_SVC_URL_ACTA: "http://{{ include "clario360.componentName" (dict "root" . "component" "acta-service") }}:8086"
  GW_SVC_URL_LEX: "http://{{ include "clario360.componentName" (dict "root" . "component" "lex-service") }}:8087"
  GW_SVC_URL_VISUS: "http://{{ include "clario360.componentName" (dict "root" . "component" "visus-service") }}:8088"
  GW_SVC_URL_NOTIFICATION: "http://{{ include "clario360.componentName" (dict "root" . "component" "notification-service") }}:8089"
  GW_SVC_URL_CYBER: "http://{{ include "clario360.componentName" (dict "root" . "component" "cyber-service") }}:8090"
  GW_SVC_URL_DATA: "http://{{ include "clario360.componentName" (dict "root" . "component" "data-service") }}:8091"
  GW_SVC_URL_FILE: "http://{{ include "clario360.componentName" (dict "root" . "component" "file-service") }}:8092"
  GW_SVC_URL_ONBOARDING: "http://{{ include "clario360.componentName" (dict "root" . "component" "onboarding-service") }}:8093"
{{- end }}
---
{{/* ================================================================
     IAM Service
     ================================================================ */}}
{{- if .Values.services.iamService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "iam-service") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "iam-service") | nindent 4 }}
data:
  AUTH_HTTP_PORT: "8081"
  AUTH_ADMIN_PORT: "9081"
  AUTH_BCRYPT_COST: {{ .Values.services.iamService.bcryptCost | default "12" | quote }}
  AUTH_JWT_ACCESS_TOKEN_TTL: {{ .Values.services.iamService.jwtAccessTokenTtl | default "15m" | quote }}
  AUTH_JWT_REFRESH_TOKEN_TTL: {{ .Values.services.iamService.jwtRefreshTokenTtl | default "7d" | quote }}
  AUTH_JWT_ISSUER: {{ .Values.services.iamService.jwtIssuer | default "clario360" | quote }}
{{- end }}
---
