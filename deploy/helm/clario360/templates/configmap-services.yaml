  VISUS_SCHEDULER_INTERVAL: {{ .Values.services.visusService.schedulerInterval | default "30s" | quote }}
  # Cross-suite service URLs
  VISUS_SUITE_ACTA_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "acta-service") }}:8086"
  VISUS_SUITE_LEX_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "lex-service") }}:8087"
  VISUS_SUITE_CYBER_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "cyber-service") }}:8090"
  VISUS_SUITE_DATA_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "data-service") }}:8091"
  VISUS_SUITE_WORKFLOW_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "workflow-engine") }}:8085"
  VISUS_SUITE_IAM_URL: "http://{{ include "clario360.componentName" (dict "root" . "component" "iam-service") }}:8081"
