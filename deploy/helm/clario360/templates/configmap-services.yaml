     Onboarding Service
     ================================================================ */}}
{{- if .Values.services.onboardingService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "onboarding-service") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "onboarding-service") | nindent 4 }}
data:
  ONBOARDING_HTTP_PORT: "8093"
  ONBOARDING_ADMIN_PORT: "9093"
  ONBOARDING_ENVIRONMENT: {{ .Values.global.environment | quote }}
{{- end }}
---
{{/* ================================================================
     Frontend
     ================================================================ */}}
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "frontend") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
data:
  NEXT_PUBLIC_API_URL: {{ .Values.frontend.publicApiUrl | default "https://clario360.example.com/api" | quote }}
  NODE_ENV: {{ .Values.frontend.nodeEnv | default "production" | quote }}
  NEXT_TELEMETRY_DISABLED: {{ .Values.frontend.telemetryDisabled | default "1" | quote }}
{{- end }}
