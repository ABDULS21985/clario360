  AUDIT_ADMIN_PORT: "9084"
  AUDIT_BATCH_SIZE: {{ .Values.services.auditService.batchSize | default "100" | quote }}
  AUDIT_BATCH_WINDOW_MS: {{ .Values.services.auditService.batchWindowMs | default "5000" | quote }}
  AUDIT_EXPORT_ASYNC_THRESHOLD: {{ .Values.services.auditService.exportAsyncThreshold | default "1000" | quote }}
  AUDIT_MINIO_BUCKET: {{ .Values.services.auditService.minioBucket | default "audit-exports" | quote }}
  AUDIT_RATELIMIT_PER_MINUTE: {{ .Values.services.auditService.rateLimitPerMinute | default "300" | quote }}
{{- end }}
