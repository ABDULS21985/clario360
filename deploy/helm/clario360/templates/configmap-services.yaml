  VISUS_KAFKA_TOPIC: {{ .Values.services.visusService.kafkaTopic | default "visus.events" | quote }}
  VISUS_RATE_LIMIT_PER_MINUTE: {{ .Values.services.visusService.rateLimitPerMinute | default "300" | quote }}
  VISUS_SERVICE_TOKEN_TTL: {{ .Values.services.visusService.serviceTokenTtl | default "5m" | quote }}
