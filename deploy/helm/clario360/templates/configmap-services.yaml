{{/* ================================================================
     File Service
     ================================================================ */}}
{{- if .Values.services.fileService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "file-service") }}-config
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "file-service") | nindent 4 }}
data:
  FILE_HTTP_PORT: "8092"
  FILE_ADMIN_PORT: "9092"
  FILE_MINIO_USE_SSL: {{ .Values.global.minio.useSsl | default "true" | quote }}
  FILE_MINIO_REGION: {{ .Values.services.fileService.minioRegion | default "us-east-1" | quote }}
  FILE_MINIO_BUCKET_PREFIX: {{ .Values.services.fileService.minioBucketPrefix | default "clario360" | quote }}
  FILE_CLAMAV_ADDRESS: {{ .Values.services.fileService.clamavAddress | default "clamav:3310" | quote }}
  FILE_CLAMAV_TIMEOUT_SEC: {{ .Values.services.fileService.clamavTimeoutSec | default "30" | quote }}
  FILE_MAX_UPLOAD_SIZE_MB: {{ .Values.services.fileService.maxUploadSizeMb | default "100" | quote }}
  FILE_QUARANTINE_BUCKET: {{ .Values.services.fileService.quarantineBucket | default "quarantine" | quote }}
  FILE_ENCRYPTION_KEY_ID: {{ .Values.services.fileService.encryptionKeyId | default "alias/clario360-files" | quote }}
  FILE_PRESIGNED_URL_EXPIRY_MIN: {{ .Values.services.fileService.presignedUrlExpiryMin | default "15" | quote }}
  FILE_TEMP_EXPIRY_DAYS: {{ .Values.services.fileService.tempExpiryDays | default "7" | quote }}
  FILE_ENVIRONMENT: {{ .Values.global.environment | quote }}
{{- end }}
---
