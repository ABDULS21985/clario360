{{- if and .Values.workflowEngine.enabled .Values.workflowEngine.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "clario360.fullname" . }}-workflow-engine
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "workflow-engine") | nindent 4 }}
spec:
  minAvailable: {{ .Values.workflowEngine.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "workflow-engine") | nindent 6 }}
{{- end }}
