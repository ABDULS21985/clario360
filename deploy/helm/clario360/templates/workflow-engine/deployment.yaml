{{- if .Values.workflowEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clario360.componentName" (dict "root" . "component" "workflow-engine") }}
  namespace: {{ include "clario360.namespace" . }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" . "component" "workflow-engine") | nindent 4 }}
spec:
  replicas: {{ .Values.workflowEngine.replicaCount | default 2 }}
  revisionHistoryLimit: {{ .Values.workflowEngine.revisionHistoryLimit | default 5 }}
  selector:
    matchLabels:
      {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "workflow-engine") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-services.yaml") . | sha256sum }}
        {{- include "clario360.prometheusAnnotations" (dict "metricsPort" "9085") | nindent 8 }}
        {{- with .Values.workflowEngine.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "workflow-engine") | nindent 8 }}
        {{- with .Values.workflowEngine.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clario360.serviceAccountName" (dict "root" . "component" "workflow-engine" "svcConfig" .Values.workflowEngine) }}
      securityContext:
        {{- include "clario360.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.workflowEngine.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: workflow-engine
          image: {{ include "clario360.image" (dict "imageConfig" .Values.workflowEngine.image "root" . "defaultRepo" "clario360/workflow-engine") }}
          imagePullPolicy: {{ .Values.workflowEngine.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- include "clario360.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
            - name: admin
              containerPort: 9085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "clario360.fullname" . }}-shared-config
            - configMapRef:
                name: {{ include "clario360.componentName" (dict "root" . "component" "workflow-engine") }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-database-credentials
                  key: PLATFORM_DB_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-redis-credentials
                  key: REDIS_PASSWORD
            - name: AUTH_RSA_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "clario360.fullname" . }}-jwt-keys
                  key: AUTH_RSA_PUBLIC_KEY_PEM
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "clario360.fullname" . }}-shared-config
                  key: KAFKA_BROKERS
            - name: OTEL_SERVICE_NAME
              value: "workflow-engine"
            {{- with .Values.workflowEngine.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "clario360.healthProbes" (dict "portName" "http" "healthPath" "/healthz" "readyPath" "/readyz") | nindent 10 }}
          resources:
            {{- toYaml .Values.workflowEngine.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (default "dev" .Values.global.environment) "production" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "clario360.componentSelectorLabels" (dict "root" . "component" "workflow-engine") | nindent 14 }}
      {{- with .Values.workflowEngine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workflowEngine.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workflowEngine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
