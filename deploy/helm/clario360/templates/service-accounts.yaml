{{/*
ServiceAccounts — one per service component.
Each SA uses the componentName helper for consistent naming and gets
the full set of component labels plus optional annotations (e.g. for
IRSA / Workload Identity).
*/}}

{{- $components := list
  "api-gateway"
  "iam-service"
  "audit-service"
  "workflow-engine"
  "notification-service"
  "file-service"
  "cyber-service"
  "data-service"
  "acta-service"
  "lex-service"
  "visus-service"
  "onboarding-service"
  "frontend"
}}

{{- $enabledMap := dict
  "api-gateway"          .Values.apiGateway.enabled
  "iam-service"          .Values.iamService.enabled
  "audit-service"        .Values.auditService.enabled
  "workflow-engine"      .Values.workflowEngine.enabled
  "notification-service" .Values.notificationService.enabled
  "file-service"         .Values.fileService.enabled
  "cyber-service"        .Values.cyberService.enabled
  "data-service"         .Values.dataService.enabled
  "acta-service"         .Values.actaService.enabled
  "lex-service"          .Values.lexService.enabled
  "visus-service"        .Values.visusService.enabled
  "onboarding-service"   .Values.onboardingService.enabled
  "frontend"             .Values.frontend.enabled
}}

{{- range $component := $components }}
{{- $enabled := index $enabledMap $component }}
{{- if $enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clario360.componentName" (dict "root" $ "component" $component) }}
  namespace: {{ include "clario360.namespace" $ }}
  labels:
    {{- include "clario360.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
  {{- with $.Values.global.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
