# =========================================================================
# Dashboard 5: Database Performance
# =========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-dashboard-database
  {{- if $dashboardNamespace }}
  namespace: {{ $dashboardNamespace }}
  {{- else }}
  namespace: {{ $namespace }}
  {{- end }}
  labels:
    {{- $labels | nindent 4 }}
    {{- with $dashboardLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  database-performance.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Query Latency Histogram (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" }, "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(db_query_duration_seconds_bucket{namespace=\"{{ $ns }}\"}[5m])) by (job, le))",
              "legendFormat": "{{`{{`}}job{{`}}`}} p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket{namespace=\"{{ $ns }}\"}[5m])) by (job, le))",
              "legendFormat": "{{`{{`}}job{{`}}`}} p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(db_query_duration_seconds_bucket{namespace=\"{{ $ns }}\"}[5m])) by (job, le))",
              "legendFormat": "{{`{{`}}job{{`}}`}} p99",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Connection Pool Utilization",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "orange", "value": 0.85 },
                  { "color": "red", "value": 0.95 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "1 - (db_pool_available_connections{namespace=\"{{ $ns }}\"} / db_pool_max_connections{namespace=\"{{ $ns }}\"})",
              "legendFormat": "{{`{{`}}job{{`}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Active Connections per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 20,
                "gradientMode": "scheme",
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" }, "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] } },
          "targets": [
            {
              "expr": "db_pool_active_connections{namespace=\"{{ $ns }}\"}",
              "legendFormat": "{{`{{`}}job{{`}}`}} active",
              "refId": "A"
            },
            {
              "expr": "db_pool_max_connections{namespace=\"{{ $ns }}\"}",
              "legendFormat": "{{`{{`}}job{{`}}`}} max",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Transaction Rates",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": { "mode": "none", "group": "A" }
              },
              "unit": "ops",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*commit.*" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*rollback.*" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              }
            ]
          },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" }, "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "expr": "sum(rate(db_transactions_total{namespace=\"{{ $ns }}\", type=\"commit\"}[5m])) by (job)",
              "legendFormat": "{{`{{`}}job{{`}}`}} commit",
              "refId": "A"
            },
            {
              "expr": "sum(rate(db_transactions_total{namespace=\"{{ $ns }}\", type=\"rollback\"}[5m])) by (job)",
              "legendFormat": "{{`{{`}}job{{`}}`}} rollback",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["clario360", "database", "postgresql"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Clario360 - Database Performance",
      "uid": "clario360-database-perf",
      "version": 1
    }
{{- end }}
