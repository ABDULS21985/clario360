# =============================================================================
# Clario 360 — Default Values (Development / Local — minikube / kind)
# =============================================================================

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  namespace: clario360
  createNamespace: false
  namespaceAnnotations: {}
  imageRegistry: ""
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  domain: localhost
  apiDomain: localhost
  tlsEnabled: false
  tlsSecretName: ""
  environment: development
  logLevel: debug
  logFormat: json
  serviceAccountAnnotations: {}

  # Infrastructure (used by _helpers.tpl URL builders and configmap-shared)
  database:
    host: clario360-postgresql
    port: "5432"
    sslMode: disable
  redis:
    host: clario360-redis-master
    port: "6379"
    db: "0"
  kafka:
    brokers: "clario360-kafka-0.clario360-kafka-headless:9092"
    securityProtocol: PLAINTEXT
    saslMechanism: ""
  otel:
    otlpEndpoint: otel-collector:4317
  minio:
    endpoint: clario360-minio:9000
    useSsl: "false"

# ---------------------------------------------------------------------------
# Database (extended config — used by migration jobs and per-service ConfigMaps)
# ---------------------------------------------------------------------------
database:
  host: clario360-postgresql
  port: 5432
  sslMode: disable
  names:
    iam: iam_db
    platform: platform_db
    cyber: cyber_db
    data: data_db
    acta: acta_db
    lex: lex_db
    visus: visus_db
  existingSecret: clario360-db-credentials
  maxConnections: 20
  minConnections: 5
  maxIdleTime: 300s
  maxLifetime: 3600s

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  host: clario360-redis-master
  port: 6379
  db: 0
  existingSecret: clario360-redis-credentials
  poolSize: 10
  minIdleConns: 3

# ---------------------------------------------------------------------------
# Kafka
# ---------------------------------------------------------------------------
kafka:
  brokers:
    - clario360-kafka-0.clario360-kafka-headless:9092
  securityProtocol: PLAINTEXT
  saslMechanism: ""
  existingSecret: ""
  topics:
    # Platform
    - name: platform.iam.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000        # 7 days
    - name: platform.onboarding.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: platform.audit.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 7776000000       # 90 days
    - name: platform.notification.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: platform.workflow.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: platform.file.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    # Cybersecurity
    - name: cyber.asset.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.vulnerability.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.threat.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.alert.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.rule.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.ctem.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.risk.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.remediation.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.dspm.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: cyber.vciso.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    # Data
    - name: data.source.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: data.pipeline.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: data.quality.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: data.contradiction.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: data.lineage.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    # Enterprise
    - name: enterprise.acta.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: enterprise.lex.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    - name: enterprise.visus.events
      partitions: 6
      replicationFactor: 1
      retentionMs: 604800000
    # Dead Letter
    - name: platform.dead-letter
      partitions: 3
      replicationFactor: 1
      retentionMs: 2592000000       # 30 days
  dlqEnabled: true

# ---------------------------------------------------------------------------
# MinIO (S3-compatible object storage)
# ---------------------------------------------------------------------------
minio:
  endpoint: clario360-minio:9000
  useSSL: false
  existingSecret: clario360-minio-credentials
  defaultBucketPrefix: clario360

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  otlpEndpoint: otel-collector:4317
  otlpProtocol: grpc
  prometheus:
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      namespace: ""
      labels: {}
  grafana:
    dashboards:
      enabled: false
      namespace: ""
      labels:
        grafana_dashboard: "1"
  alerting:
    enabled: false
    rules: []

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
jwt:
  algorithm: RS256
  accessTokenExpiry: 15m
  refreshTokenExpiry: 7d
  existingSecret: clario360-jwt-keys

# ---------------------------------------------------------------------------
# Encryption
# ---------------------------------------------------------------------------
encryption:
  existingSecret: clario360-encryption-key

# ---------------------------------------------------------------------------
# Email
# ---------------------------------------------------------------------------
email:
  enabled: false
  host: ""
  port: 587
  from: "Clario 360 <notifications@clario360.com>"
  existingSecret: clario360-smtp-credentials

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  tls: []

# ---------------------------------------------------------------------------
# Network Policies
# ---------------------------------------------------------------------------
networkPolicies:
  enabled: false
  ingressNamespace: ingress-nginx

# ---------------------------------------------------------------------------
# Resource Quotas
# ---------------------------------------------------------------------------
resourceQuotas:
  enabled: false
  requests:
    cpu: "16"
    memory: "32Gi"
    ephemeralStorage: "10Gi"
  limits:
    cpu: "32"
    memory: "64Gi"
    ephemeralStorage: "20Gi"
  pods: "100"
  services: "30"
  configmaps: "50"
  secrets: "50"
  persistentvolumeclaims: "20"

# ---------------------------------------------------------------------------
# Limit Range
# ---------------------------------------------------------------------------
limitRange:
  default:
    cpu: "250m"
    memory: "256Mi"
  defaultRequest:
    cpu: "50m"
    memory: "64Mi"
  max:
    cpu: "4"
    memory: "4Gi"
  min:
    cpu: "10m"
    memory: "16Mi"
  pvcMax: "50Gi"
  pvcMin: "1Gi"

# ---------------------------------------------------------------------------
# Secrets (existingSecret pattern)
# When existingSecret is set, the chart does NOT create the Secret resource.
# ---------------------------------------------------------------------------
secrets:
  database:
    existingSecret: ""
    user: "clario360"
    password: ""
    iamDb: "iam_db"
    platformDb: "platform_db"
    cyberDb: "cyber_db"
    dataDb: "data_db"
    actaDb: "acta_db"
    lexDb: "lex_db"
    visusDb: "visus_db"
  redis:
    existingSecret: ""
    password: ""
  kafka:
    existingSecret: ""
    saslUsername: ""
    saslPassword: ""
  jwt:
    existingSecret: ""
    rsaPrivateKeyPem: ""
    rsaPublicKeyPem: ""
  encryption:
    existingSecret: ""
    key: ""
  minio:
    existingSecret: ""
    accessKey: ""
    secretKey: ""
  smtp:
    existingSecret: ""
    username: ""
    password: ""
  notification:
    existingSecret: ""
    webhookHmacSecret: ""
    sendgridApiKey: ""

# ---------------------------------------------------------------------------
# Seed Data (development only)
# ---------------------------------------------------------------------------
seedData:
  enabled: true
  image:
    repository: clario360/seeder
    tag: "1.0.0"
    pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Database Migration Job
# ---------------------------------------------------------------------------
migration:
  enabled: true
  image:
    repository: clario360/migrator
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  backoffLimit: 3
  activeDeadlineSeconds: 600

# =============================================================================
