global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@clario360.sa'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    # Critical alerts → PagerDuty immediately
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Critical alerts also to Slack
    - match:
        severity: critical
      receiver: 'slack-critical'
      continue: true

    # Security alerts → security team Slack + PagerDuty
    - match:
        team: security
      receiver: 'security-team'
      continue: true

    # Warning alerts → Slack only
    - match:
        severity: warning
      receiver: 'slack-warnings'
      repeat_interval: 12h

    # Business alerts → business Slack channel
    - match_re:
        team: 'data|legal|governance'
      receiver: 'slack-business'

receivers:
  - name: 'default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_DEFAULT}'
        channel: '#clario360-alerts'
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          runbook: '{{ .CommonAnnotations.runbook }}'

  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#clario360-critical'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '{{ template "slack.clario360.title" . }}'
        text: '{{ template "slack.clario360.text" . }}'
        send_resolved: true

  - name: 'security-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_SECURITY}'
        channel: '#clario360-security'
        title: '{{ template "slack.clario360.title" . }}'
        text: '{{ template "slack.clario360.text" . }}'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_SECURITY_KEY}'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_DEFAULT}'
        channel: '#clario360-warnings'
        title: '{{ template "slack.clario360.title" . }}'
        text: '{{ template "slack.clario360.text" . }}'
        send_resolved: true

  - name: 'slack-business'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_BUSINESS}'
        channel: '#clario360-business-alerts'
        title: '{{ template "slack.clario360.title" . }}'
        text: '{{ template "slack.clario360.text" . }}'
        send_resolved: true

inhibit_rules:
  # If ServiceDown is firing, suppress ServiceHighErrorRate for the same service
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'ServiceHighErrorRate'
    equal: ['service']

  # If critical firing, suppress warning for same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
