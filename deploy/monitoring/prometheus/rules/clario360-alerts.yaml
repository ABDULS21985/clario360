groups:
  - name: clario360-service-health
    rules:
      - alert: ServiceDown
        expr: up{job=~"clario360-.*"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 2 minutes."
          runbook: "docs/runbooks/incident-response/IR-001-service-outage.md"

      - alert: ServiceHighErrorRate
        expr: |
          (
            sum(rate(clario360_gateway_requests_total{status_code=~"5.."}[5m])) by (service)
            /
            sum(rate(clario360_gateway_requests_total[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.service }} error rate above 5%"
          description: "{{ $labels.service }} is returning 5xx errors at {{ $value | humanizePercentage }} rate."
          runbook: "docs/runbooks/incident-response/IR-001-service-outage.md"

      - alert: ServiceHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(clario360_gateway_request_duration_seconds_bucket[5m])) by (service, le)
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.service }} p95 latency above 1 second"
          description: "{{ $labels.service }} p95 response time is {{ $value | humanizeDuration }}."
          runbook: "docs/runbooks/troubleshooting/TS-001-slow-api-responses.md"

      - alert: ServiceHighLatencyCritical
        expr: |
          histogram_quantile(0.95,
            sum(rate(clario360_gateway_request_duration_seconds_bucket[5m])) by (service, le)
          ) > 5.0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.service }} p95 latency above 5 seconds — CRITICAL"
          runbook: "docs/runbooks/troubleshooting/TS-001-slow-api-responses.md"

      - alert: ServicePodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total{namespace="clario360"}[1h]) > 5
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping ({{ $value }} restarts in 1h)"
          runbook: "docs/runbooks/incident-response/IR-002-pod-crash-loop.md"

      - alert: ServicePodNotReady
        expr: kube_pod_status_ready{namespace="clario360",condition="true"} == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"

  - name: clario360-database
    rules:
      - alert: DatabaseConnectionPoolExhaustion
        expr: clario360_db_connections_active / clario360_db_connections_max > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Database connection pool at {{ $value | humanizePercentage }}"
          runbook: "docs/runbooks/troubleshooting/TS-008-connection-pool-exhaustion.md"

      - alert: DatabaseSlowQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(clario360_db_query_duration_seconds_bucket[5m])) by (table, le)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Slow database queries on table {{ $labels.table }}"
          runbook: "docs/runbooks/troubleshooting/TS-001-slow-api-responses.md"

      - alert: DatabaseConnectionPoolCritical
        expr: clario360_db_connections_active / clario360_db_connections_max > 0.95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database connection pool CRITICAL at {{ $value | humanizePercentage }}"
          runbook: "docs/runbooks/troubleshooting/TS-008-connection-pool-exhaustion.md"

      - alert: DatabaseReplicationLag
        expr: pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL replication lag is {{ $value }}s"
          runbook: "docs/runbooks/troubleshooting/TS-010-replication-lag.md"

      - alert: DatabaseDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="clario360"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Database deadlock detected ({{ $value }} in last 5m)"

  - name: clario360-kafka
    rules:
      - alert: KafkaConsumerLagHigh
        expr: clario360_kafka_consumer_lag > 10000
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag high on {{ $labels.topic }}: {{ $value }} messages"
          runbook: "docs/runbooks/troubleshooting/TS-003-missing-events.md"

      - alert: KafkaConsumerLagCritical
        expr: clario360_kafka_consumer_lag > 100000
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka consumer lag CRITICAL on {{ $labels.topic }}: {{ $value }} messages"

      - alert: DeadLetterQueueGrowing
        expr: increase(clario360_kafka_messages_consumed_total{topic="platform.dead-letter"}[1h]) > 100
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Dead letter queue received {{ $value }} messages in the last hour"
          runbook: "docs/runbooks/troubleshooting/TS-003-missing-events.md"

      - alert: KafkaBrokerDown
        expr: count(kafka_broker_info) < 3
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka cluster has fewer than 3 brokers ({{ $value }})"

  - name: clario360-security
    rules:
      - alert: HighFailedLoginRate
        expr: sum(rate(clario360_auth_login_failures_total[5m])) > 10
        for: 5m
        labels:
          severity: high
          team: security
        annotations:
          summary: "High rate of failed logins: {{ $value | humanize }}/sec"

      - alert: BruteForceDetected
        expr: sum by (ip) (increase(clario360_auth_login_failures_total[15m])) > 20
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Possible brute force attack from IP {{ $labels.ip }}"

      - alert: CriticalSecurityAlert
        expr: increase(clario360_cyber_alerts_total{severity="critical"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "New critical security alert detected"

      - alert: AuditHashChainBroken
        expr: clario360_audit_chain_valid == 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Audit trail hash chain integrity failure detected"
          runbook: "docs/runbooks/troubleshooting/TS-009-audit-chain-broken.md"

      - alert: HighRiskScoreIncrease
        expr: delta(clario360_cyber_risk_score_current[1h]) > 20
        for: 0m
        labels:
          severity: high
          team: security
        annotations:
          summary: "Risk score increased by {{ $value }} points in the last hour"

      - alert: VulnerabilityRemediationSLABreach
        expr: clario360_cyber_vuln_sla_compliance_rate < 0.8
        for: 24h
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Vulnerability SLA compliance dropped to {{ $value | humanizePercentage }}"

  - name: clario360-business
    rules:
      - alert: PipelineFailureRateHigh
        expr: |
          (
            sum(increase(clario360_data_pipeline_runs_total{status="failed"}[24h]))
            /
            sum(increase(clario360_data_pipeline_runs_total[24h]))
          ) > 0.2
        for: 0m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Pipeline failure rate above 20% in the last 24 hours"

      - alert: DataQualityScoreDrop
        expr: clario360_data_quality_score < 80
        for: 30m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Data quality score dropped to {{ $value }}%"

      - alert: ContractsExpiringWithoutAction
        expr: clario360_lex_contracts_expiring_7d > 0
        for: 0m
        labels:
          severity: high
          team: legal
        annotations:
          summary: "{{ $value }} contracts expiring within 7 days without renewal action"

      - alert: OverdueActionItemsHigh
        expr: clario360_acta_overdue_action_items > 10
        for: 24h
        labels:
          severity: warning
          team: governance
        annotations:
          summary: "{{ $value }} overdue board action items"

      - alert: DataContradictionsDetected
        expr: increase(clario360_data_contradictions_total[1h]) > 5
        for: 0m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "{{ $value }} data contradictions detected in the last hour"

      - alert: AIModelDriftDetected
        expr: clario360_ai_model_drift_score > 0.3
        for: 30m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "AI model drift score {{ $value }} exceeds threshold"

  - name: clario360-slo
    rules:
      - alert: SLOBudgetBurnRateHigh_1h
        expr: |
          (
            1 - (sum(rate(clario360_gateway_requests_total{status_code!~"5.."}[1h])) / sum(rate(clario360_gateway_requests_total[1h])))
          ) > (14.4 * (1 - 0.999))
        for: 2m
        labels:
          severity: critical
          team: platform
          slo: availability
        annotations:
          summary: "SLO burn rate critical — exhausting monthly error budget in < 1 hour"

      - alert: SLOBudgetBurnRateHigh_6h
        expr: |
          (
            1 - (sum(rate(clario360_gateway_requests_total{status_code!~"5.."}[6h])) / sum(rate(clario360_gateway_requests_total[6h])))
          ) > (6 * (1 - 0.999))
        for: 5m
        labels:
          severity: warning
          team: platform
          slo: availability
        annotations:
          summary: "SLO burn rate elevated — may exhaust monthly error budget"
          runbook: "docs/runbooks/incident-response/IR-005-slo-budget-exhaustion.md"

      - alert: SLOBudgetBurnRateHigh_24h
        expr: |
          (
            1 - (sum(rate(clario360_gateway_requests_total{status_code!~"5.."}[24h])) / sum(rate(clario360_gateway_requests_total[24h])))
          ) > (3 * (1 - 0.999))
        for: 30m
        labels:
          severity: warning
          team: platform
          slo: availability
        annotations:
          summary: "SLO burn rate sustained — error budget consumption above sustainable rate"

      - alert: LatencySLOBreach
        expr: |
          histogram_quantile(0.99,
            sum(rate(clario360_gateway_request_duration_seconds_bucket[1h])) by (le)
          ) > 2.0
        for: 5m
        labels:
          severity: warning
          team: platform
          slo: latency
        annotations:
          summary: "Latency SLO breach — p99 above 2 seconds for 1h window"

  - name: clario360-infrastructure
    rules:
      - alert: PodCPUHigh
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="clario360"}[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="clario360",resource="cpu"}) by (pod)
          > 0.85
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} CPU usage above 85%"

      - alert: PodMemoryHigh
        expr: |
          sum(container_memory_working_set_bytes{namespace="clario360"}) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="clario360",resource="memory"}) by (pod)
          > 0.90
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} memory usage above 90%"
          runbook: "docs/runbooks/incident-response/IR-007-memory-exhaustion.md"

      - alert: PodOOMKilled
        expr: increase(kube_pod_container_status_restarts_total{namespace="clario360",reason="OOMKilled"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} was OOMKilled"
          runbook: "docs/runbooks/incident-response/IR-007-memory-exhaustion.md"

      - alert: PVCAlmostFull
        expr: |
          kubelet_volume_stats_used_bytes{namespace="clario360"}
          /
          kubelet_volume_stats_capacity_bytes{namespace="clario360"}
          > 0.85
        for: 30m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
          runbook: "docs/runbooks/incident-response/IR-006-disk-full.md"

      - alert: CertificateExpiringSoon
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 604800
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Certificate {{ $labels.name }} expires in less than 7 days"
          runbook: "docs/runbooks/operations/OP-005-certificate-renewal.md"

      - alert: PodCPUCritical
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="clario360"}[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{namespace="clario360",resource="cpu"}) by (pod)
          > 0.95
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} CPU usage above 95% — CRITICAL"
          runbook: "docs/runbooks/scaling/SC-001-horizontal-scaling.md"

      - alert: PVCCriticallyFull
        expr: |
          kubelet_volume_stats_used_bytes{namespace="clario360"}
          /
          kubelet_volume_stats_capacity_bytes{namespace="clario360"}
          > 0.95
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — CRITICAL"
          runbook: "docs/runbooks/incident-response/IR-006-disk-full.md"

      - alert: CertificateExpiryCritical
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 86400
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Certificate {{ $labels.name }} expires in less than 24 hours"
          runbook: "docs/runbooks/operations/OP-005-certificate-renewal.md"

      - alert: BackupJobFailed
        expr: kube_job_status_failed{namespace="clario360",job_name=~"database-backup.*"} > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database backup job failed"
          runbook: "docs/runbooks/operations/OP-004-backup-verification.md"

      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} is not ready"

      - alert: HPAMaxedOut
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas{namespace="clario360"}
          ==
          kube_horizontalpodautoscaler_spec_max_replicas{namespace="clario360"}
        for: 30m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} is at max replicas"
          runbook: "docs/runbooks/scaling/SC-001-horizontal-scaling.md"
