global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: clario360-production
    environment: production

rule_files:
  - "rules/clario360-alerts.yaml"
  - "rules/slo-recording-rules.yaml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Core Platform Services ---

  - job_name: "clario360-api-gateway"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["api-gateway:9090"]
        labels:
          service: "api-gateway"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'gw_(.*)'
        target_label: __name__
        replacement: 'clario360_gateway_${1}'
      - source_labels: [__name__]
        regex: 'db_(.*)'
        target_label: __name__
        replacement: 'clario360_db_${1}'
      - source_labels: [__name__]
        regex: 'kafka_(.*)'
        target_label: __name__
        replacement: 'clario360_kafka_${1}'
      - source_labels: [__name__]
        regex: 'http_(.*)'
        target_label: __name__
        replacement: 'clario360_http_${1}'

