apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notebook-default-deny
spec:
  podSelector:
    matchLabels:
      component: singleuser-server
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notebook-allow-hub-ingress
spec:
  podSelector:
    matchLabels:
      component: singleuser-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: proxy
        - podSelector:
            matchLabels:
              component: hub
      ports:
        - port: 8888
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notebook-allow-clario360-and-data
spec:
  podSelector:
    matchLabels:
      component: singleuser-server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.clario360.name | quote }}
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8080
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.data.name | quote }}
      ports:
        - port: 9000
          protocol: TCP
        - port: 8123
          protocol: TCP
        - port: 21050
          protocol: TCP
        - port: 10000
          protocol: TCP
        - port: 9083
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.hadoop.name | quote }}
      ports:
        - port: 8020
          protocol: TCP
        - port: 9870
          protocol: TCP
        - port: 9866
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.spark.name | quote }}
      ports:
        - port: 7077
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.db.name | quote }}
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.namespaceSelectors.dagster.name | quote }}
      ports:
        - port: 3000
          protocol: TCP
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.networkPolicy.allowInternet }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notebook-allow-development-internet
spec:
  podSelector:
    matchLabels:
      component: singleuser-server
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
{{- end }}
