<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Subject}}</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; background-color:#f5f5f5; -webkit-font-smoothing:antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f5f5f5; padding:20px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px; width:100%; background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background-color:{{.PrimaryColor}}; padding:24px 30px; text-align:center;">
              <h1 style="color:#ffffff; margin:0; font-size:24px; font-weight:700; letter-spacing:0.5px;">Clario 360</h1>
              <p style="color:{{.AccentColor}}; margin:4px 0 0 0; font-size:12px; letter-spacing:1px; text-transform:uppercase;">Enterprise AI Platform</p>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:30px;">
              {{.Content}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f9fa; padding:20px 30px; text-align:center; border-top:1px solid #e9ecef;">
              <p style="margin:0 0 8px 0; font-size:12px; color:#6c757d;">
                &copy; {{.Year}} Clario 360. All rights reserved.
              </p>
              <p style="margin:0; font-size:11px; color:#adb5bd;">
                You received this notification because of your role or preferences in the Clario 360 platform.
                <br>To manage your notification preferences, visit your account settings.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
