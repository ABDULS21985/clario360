<h2 style="color:#333; margin:0 0 16px 0; font-size:20px;">{{.title}}</h2>
<div style="background-color:#f8f9fa; padding:16px; border-radius:4px; margin-bottom:20px;">
  <p style="margin:0; color:#333; font-size:14px; line-height:1.6;">{{.body}}</p>
</div>
{{if .action_url}}
<p style="text-align:center; margin:24px 0 0 0;">
  <a href="{{.action_url}}" style="display:inline-block; background-color:#1B5E20; color:#ffffff; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:600; font-size:14px;">View Details</a>
</p>
{{end}}
