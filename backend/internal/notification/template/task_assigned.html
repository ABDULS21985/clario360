<h2 style="color:#1B5E20; margin:0 0 16px 0; font-size:20px;">New Task Assigned</h2>
<div style="background-color:#e8f5e9; padding:16px; border-left:4px solid #1B5E20; border-radius:4px; margin-bottom:20px;">
  <p style="margin:0;">{{.body}}</p>
</div>
{{if .sla_deadline}}
<p style="color:#666; font-size:14px;"><strong>Due:</strong> {{.sla_deadline | formatDate}}</p>
{{end}}
{{if .action_url}}
<p style="text-align:center; margin:24px 0 0 0;">
  <a href="{{.action_url}}" style="display:inline-block; background-color:#1B5E20; color:#ffffff; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:600; font-size:14px;">View Task</a>
</p>
{{end}}
