<h2 style="color:#d32f2f; margin:0 0 16px 0; font-size:20px;">Security Alert</h2>
<div style="background-color:#fce4ec; padding:16px; border-left:4px solid #d32f2f; border-radius:4px; margin-bottom:20px;">
  <p style="margin:0 0 8px 0;"><strong>Priority:</strong> <span style="text-transform:uppercase; color:#d32f2f;">{{.priority}}</span></p>
  <p style="margin:0;">{{.body}}</p>
</div>
{{if .source}}<p style="color:#666; font-size:14px;"><strong>Source:</strong> {{.source}}</p>{{end}}
{{if .action_url}}
<p style="text-align:center; margin:24px 0 0 0;">
  <a href="{{.action_url}}" style="display:inline-block; background-color:#1B5E20; color:#ffffff; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:600; font-size:14px;">View Alert</a>
</p>
{{end}}
