<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D4B4F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B96E"/>
      <stop offset="100%" stop-color="#C6A962"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C6A962"/>
      <stop offset="50%" stop-color="#E0CC85"/>
      <stop offset="100%" stop-color="#C6A962"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Outer orbit ring -->
  <ellipse cx="256" cy="268" rx="170" ry="170" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.35"/>
  <!-- Tilted orbit ring -->
  <ellipse cx="256" cy="268" rx="170" ry="65" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.5" transform="rotate(-25 256 268)"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="268" r="88" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.25"/>
  <!-- "B" letterform -->
  <text x="198" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="220" fill="white" letter-spacing="-8">B</text>
  <!-- "360" arc text - simplified as straight text -->
  <text x="288" y="210" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="62" fill="url(#gold)">360</text>
  <!-- Accent dot on the orbit -->
  <circle cx="408" cy="178" r="10" fill="#E0CC85"/>
  <!-- Small accent dot -->
  <circle cx="112" cy="348" r="7" fill="#C6A962" opacity="0.6"/>
</svg>
