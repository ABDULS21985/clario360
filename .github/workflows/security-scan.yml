# =============================================================================
# Clario 360 — Weekly Security Scan
# Comprehensive security audit beyond what runs on each PR.
# Schedule: Monday 06:00 UTC + manual trigger.
# =============================================================================

name: Weekly Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

env:
  GOWORK: "off"

jobs:
  # ===========================================================================
  # JOB 1: Dependency audit
  # ===========================================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/setup-node

      - name: Go vulnerability check
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "## Go Vulnerability Report" > /tmp/go-vuln-report.txt
          govulncheck ./... 2>&1 | tee -a /tmp/go-vuln-report.txt || true

      - name: Go module updates check
        working-directory: backend
        run: |
          echo "## Outdated Go Modules" > /tmp/go-outdated.txt
          go list -m -u all 2>/dev/null | grep '\[' | tee -a /tmp/go-outdated.txt || echo "All modules up to date"

      - name: npm full audit (including dev)
        working-directory: frontend
        run: |
          npm ci
          echo "## npm Audit Report" > /tmp/npm-audit-report.txt
          npm audit --json 2>/dev/null | tee -a /tmp/npm-audit-report.txt || true

      - name: npm outdated check
        working-directory: frontend
        run: |
          echo "## Outdated npm Packages" > /tmp/npm-outdated.txt
          npm outdated --json 2>/dev/null | tee -a /tmp/npm-outdated.txt || echo "All packages up to date"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: /tmp/*-report.txt
          retention-days: 90

  # ===========================================================================
  # JOB 2: Container image scan (all services)
  # ===========================================================================
  container-scan:
    name: Scan ${{ matrix.service }} Image
    runs-on: ubuntu-latest
    if: vars.CONTAINER_REGISTRY != ''
    timeout-minutes: 15
    strategy:
      matrix:
        service:
          - api-gateway
          - iam-service
          - audit-service
          - workflow-engine
          - notification-service
          - file-service
          - cyber-service
          - data-service
          - acta-service
          - lex-service
          - visus-service
          - onboarding-service
          - migrator
          - seeder
          - frontend
      fail-fast: false
      max-parallel: 5

    steps:
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Scan with Trivy (all severities)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ vars.CONTAINER_REGISTRY }}/clario360/${{ matrix.service }}:latest"
          format: sarif
          output: trivy-weekly-${{ matrix.service }}.sarif
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-weekly-${{ matrix.service }}.sarif
          category: trivy-weekly-${{ matrix.service }}

  # ===========================================================================
  # JOB 3: Infrastructure scan (Helm templates)
  # ===========================================================================
  infrastructure-scan:
    name: Infrastructure Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Template Helm chart
        run: |
          helm template clario360 deploy/helm/clario360 \
            --output-dir /tmp/helm-rendered \
            2>/dev/null || echo "Helm template rendering completed with warnings"

      - name: Install checkov
        run: pip install checkov

      - name: Scan Helm templates with checkov
        run: |
          checkov -d /tmp/helm-rendered/ \
            --framework kubernetes \
            --output sarif \
            --output-file /tmp/checkov-results.sarif \
            --soft-fail || true

      - name: Upload checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/checkov-results.sarif
          category: checkov-infrastructure

      - name: Helm lint
        run: helm lint deploy/helm/clario360

  # ===========================================================================
  # JOB 4: Deep secret scan
  # ===========================================================================
  secret-scan:
    name: Deep Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog deep scan (full history)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --json

  # ===========================================================================
  # JOB 5: SAST scan
  # ===========================================================================
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (comprehensive)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/golang
            p/typescript
            p/security-audit
            p/owasp-top-ten
            p/secrets
            p/docker
            p/kubernetes
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep-weekly

  # ===========================================================================
  # JOB 6: Generate consolidated report
  # ===========================================================================
  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [dependency-audit, infrastructure-scan, secret-scan, sast-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download audit reports
        uses: actions/download-artifact@v4
        with:
          name: dependency-audit
          path: reports/
        continue-on-error: true

      - name: Generate consolidated report
        id: report
        run: |
          echo "## Weekly Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> security-report.md
          echo "**Commit:** ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "### Job Results" >> security-report.md
          echo "| Scan | Status |" >> security-report.md
          echo "|------|--------|" >> security-report.md
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> security-report.md
          echo "| Infrastructure Scan | ${{ needs.infrastructure-scan.result }} |" >> security-report.md
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> security-report.md
          echo "| SAST Scan | ${{ needs.sast-scan.result }} |" >> security-report.md
          echo "" >> security-report.md

          # Check if any jobs failed
          if echo "${{ needs.dependency-audit.result }} ${{ needs.infrastructure-scan.result }} ${{ needs.secret-scan.result }} ${{ needs.sast-scan.result }}" | grep -q "failure"; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

          cat security-report.md

      - name: Create GitHub Issue for failures
        if: steps.report.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Weekly scan found issues — ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['security', 'automated']
            });
