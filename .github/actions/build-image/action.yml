name: Build and Push Container Image
description: Build, push, sign, and scan a container image

inputs:
  service:
    description: Service name (e.g., api-gateway, frontend)
    required: true
  registry:
    description: Container registry URL
    required: true
  username:
    description: Registry username
    required: true
  password:
    description: Registry password
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: deploy/docker/Dockerfile.backend
  push:
    description: Whether to push the image
    required: false
    default: "true"

outputs:
  image:
    description: Full image reference
    value: ${{ steps.meta.outputs.tags }}
  digest:
    description: Image digest
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Extract metadata (tags + labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/clario360/${{ inputs.service }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        build-args: |
          BUILD_SERVICE=${{ inputs.service }}
          BUILD_VERSION=${{ github.sha }}
          BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ inputs.service }}
        cache-to: type=gha,mode=max,scope=${{ inputs.service }}
        platforms: linux/amd64

    - name: Install Cosign
      if: inputs.push == 'true'
      uses: sigstore/cosign-installer@main

    - name: Sign image with Cosign
      if: inputs.push == 'true'
      shell: bash
      run: |
        cosign sign --yes "${{ inputs.registry }}/clario360/${{ inputs.service }}@${{ steps.build.outputs.digest }}"

    - name: Scan image with Trivy
      if: inputs.push == 'true'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: "${{ inputs.registry }}/clario360/${{ inputs.service }}@${{ steps.build.outputs.digest }}"
        format: sarif
        output: trivy-${{ inputs.service }}.sarif
        severity: CRITICAL,HIGH
        exit-code: "1"

    - name: Upload Trivy SARIF
      if: inputs.push == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-${{ inputs.service }}.sarif
        category: trivy-${{ inputs.service }}

    - name: Generate SBOM
      if: inputs.push == 'true'
      uses: anchore/sbom-action@v0
      with:
        image: "${{ inputs.registry }}/clario360/${{ inputs.service }}@${{ steps.build.outputs.digest }}"
        format: spdx-json
        output-file: sbom-${{ inputs.service }}.spdx.json

    - name: Upload SBOM artifact
      if: inputs.push == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ inputs.service }}
        path: sbom-${{ inputs.service }}.spdx.json
        retention-days: 90
